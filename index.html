```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моей принцессы ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
overflow:hidden;
}

/* конверт */

.envelope{
width:320px;
height:200px;
background:#ff4d6d;
position:relative;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
transition:0.6s;
}

.letter{
position:absolute;
background:white;
color:#444;
width:300px;
padding:30px;
border-radius:15px;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
text-align:center;
font-size:22px;
line-height:1.6;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
transition:0.6s;
}

/* анимация текста */

.love{
font-size:28px;
color:#ff2e63;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

/* лепестки */

.petal{
position:absolute;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* сердечки */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 2s linear forwards;
}

@keyframes float{
to{
transform:translateY(-120px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()" id="env">
💌 Нажми чтобы открыть
</div>

<div class="letter" id="letter">
<div class="love">❤️ С 8 Марта ❤️</div>
<br>
я тебя люблю несмотря не на что зайка,<br>
просто обожаю моя принцесса 💖
</div>

<!-- музыка -->
<audio autoplay loop>
<source src="boleyu.mp3" type="audio/mpeg">
</audio>

<script>

/* открыть письмо */

function openLetter(){
document.getElementById("env").style.transform="scale(0)";
document.getElementById("letter").style.transform="translate(-50%,-50%) scale(1)";
}

/* падающие лепестки */

setInterval(()=>{
let petal=document.createElement("div")
petal.className="petal"
petal.innerHTML="🌸"
petal.style.left=Math.random()*100+"vw"
petal.style.animationDuration=4+Math.random()*6+"s"

document.body.appendChild(petal)

setTimeout(()=>petal.remove(),9000)

},250)

/* сердечки при клике */

document.addEventListener("click",e=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=e.clientX+"px"
heart.style.top=e.clientY+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

})

</script>

</body>
</html>
