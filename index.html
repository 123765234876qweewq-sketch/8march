<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта!</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.card{
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

h1{
    font-size:50px;
}

p{
    font-size:22px;
    margin-top:20px;
}

button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>🌸 С 8 Марта! 🌸</h1>

<p>
Пусть этот день принесёт радость,  
улыбки и много счастья!  
</p>

<p>
Спасибо, что ты есть ❤️
</p>

<button onclick="showMessage()">Нажми сюда</button>

</div>

<script>
function showMessage(){
alert("Ты самая прекрасная! 💐");
}
</script>

</body>
</html>
