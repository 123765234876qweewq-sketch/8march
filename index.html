```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта, мама ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
}

/* кнопка открытки */

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
cursor:pointer;
font-size:24px;
color:#ff4d6d;
transition:0.5s;
}

/* письмо */

.letter{
position:absolute;
background:white;
color:#444;
width:320px;
padding:35px;
border-radius:20px;
text-align:center;
font-size:20px;
line-height:1.6;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
transform:scale(0);
transition:0.6s;
}

/* анимация текста */

.title{
font-size:28px;
color:#ff4d6d;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* лепестки */

.petal{
position:absolute;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* сердечки */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 2s linear forwards;
}

@keyframes float{
to{
transform:translateY(-120px);
opacity:0;
}

}

</style>
</head>

<body>

<div class="card" onclick="openLetter()" id="card">
💌 Нажми чтобы открыть поздравление
</div>

<div class="letter" id="letter">
<div class="title">🌸 С 8 Марта, мама! 🌸</div>
<br>
Дорогая мама ❤️<br><br>

Спасибо тебе за заботу,  
любовь и поддержку.  

Ты самый важный  
и родной человек в моей жизни.  

Пусть каждый день приносит  
тебе радость, тепло  
и много счастливых моментов 💐

</div>

<script>

/* открыть письмо */

function openLetter(){
document.getElementById("card").style.display="none"
document.getElementById("letter").style.transform="scale(1)"
}

/* падающие лепестки */

setInterval(()=>{
let petal=document.createElement("div")
petal.className="petal"
petal.innerHTML="🌸"
petal.style.left=Math.random()*100+"vw"
petal.style.animationDuration=4+Math.random()*5+"s"

document.body.appendChild(petal)

setTimeout(()=>petal.remove(),9000)

},200)

/* сердечки при клике */

document.addEventListener("click",e=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=e.clientX+"px"
heart.style.top=e.clientY+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

})

</script>

</body>
</html>
```
